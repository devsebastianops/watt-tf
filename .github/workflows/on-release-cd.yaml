name: Release Docker

on:
  release:
    types: [published]

jobs:
  docker:
    name: Release Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract Metadata (Tags, Labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/watt-tf
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: ${{ secrets.DOCKER_USERNAME }}/watt-tf
          readme-filepath: README.md

      - name: Build and push
        uses: docker/build-push-action@v7
        with: 
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  go:
    name: Release Go Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'
        cache-dependency-path: 'go.sum'
    
    - name: Install dependencies
      run: go mod download

    - name: Get tag version
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Build binary
      id: build
      run: |
        BINARY_NAME="wtf"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME+=".exe"
        fi

        echo "binary_name=$BINARY_NAME" >> "$GITHUB_OUTPUT"

        CGO_ENABLED=0 GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" go build -ldflags="-s -w" -o "$BINARY_NAME" ./cmd/wtf/main.go

    - name: Package binary
      id: package
      env:
        BINARY_NAME: ${{ steps.build.outputs.binary_name }}
      run: |
        ARCHIVE_NAME="wtf-${{ matrix.goos }}-${{ matrix.goarch }}-${{ steps.get_version.outputs.VERSION }}"
        if [ "${{ matrix.goos }}" = "windows" ]; then
          ARCHIVE_NAME+=".zip"
          zip -r "$ARCHIVE_NAME" "$BINARY_NAME"
        else
          ARCHIVE_NAME+=".tar.gz"
          tar -czf "$ARCHIVE_NAME" "$BINARY_NAME"
        fi
        
        echo "archive_name=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"

    - name: Update GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        files: ${{ steps.package.outputs.archive_name }}

  github-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: ./docs
        run: npm install

      - name: Build documentation
        working-directory: ./docs
        run: npm run docs:build

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5